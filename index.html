<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FMC · Pokémon Card Checklist</title>
<style>
  :root {
    --bg: #12141a;
    --card-bg: #1c1f28;
    --card-bg-2: #232734;
    --text: #eef0f5;
    --text-dim: #9aa1b2;
    --accent: #ff5350;
    --gold: #f5c542;
    --blue: #4e8cff;
    --green: #45c07f;
    --border: #2e3342;
    --radius: 14px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans SC", sans-serif;
    min-height: 100vh;
    padding-bottom: 60px;
  }
  header {
    position: sticky; top: 0; z-index: 10;
    background: rgba(18,20,26,.92);
    backdrop-filter: blur(10px);
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
  }
  .title-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 10px; }
  .tabs {
    display: flex; gap: 6px; margin-bottom: 10px;
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 99px; padding: 4px;
  }
  .tab {
    flex: 1; text-align: center; font-size: 14px; font-weight: 600;
    color: var(--text-dim); padding: 8px 0; border-radius: 99px;
    cursor: pointer; transition: all .15s; user-select: none;
  }
  .tab.active { background: var(--accent); color: #fff; }
  .tab.active.owned-tab { background: var(--green); }
  .tab.active.jp-tab { background: #8b5cf6; color:#fff; }
  h1 { font-size: 19px; font-weight: 700; letter-spacing: .3px; }
  h1 .ball { color: var(--accent); }
  .count-pill {
    font-size: 12px; color: var(--text-dim);
    background: var(--card-bg); border: 1px solid var(--border);
    padding: 2px 10px; border-radius: 99px;
  }
  .searchbox { position: relative; }
  .searchbox input {
    width: 100%;
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 17px;
    padding: 13px 42px 13px 42px;
    outline: none;
    transition: border-color .15s;
  }
  .searchbox input:focus { border-color: var(--blue); }
  .searchbox input::placeholder { color: #5c637a; }
  .searchbox .icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: #5c637a; font-size: 16px; pointer-events: none;
  }
  .searchbox .clear {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    width: 30px; height: 30px; border-radius: 50%;
    border: none; background: var(--card-bg-2); color: var(--text-dim);
    font-size: 15px; display: none; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .hint { font-size: 12px; color: #5c637a; margin-top: 7px; }
  .chips {
    display: flex; gap: 8px; overflow-x: auto; margin-top: 10px;
    scrollbar-width: none; -webkit-overflow-scrolling: touch;
  }
  .chips::-webkit-scrollbar { display: none; }
  .chip {
    flex: 0 0 auto;
    background: var(--card-bg); border: 1px solid var(--border);
    color: var(--text-dim); font-size: 13px;
    padding: 7px 14px; border-radius: 99px; cursor: pointer;
    transition: all .15s; user-select: none;
  }
  .chip.active { background: var(--blue); border-color: var(--blue); color: #fff; font-weight: 600; }
  .langrow { display: flex; gap: 8px; margin-top: 10px; }
  .langbtn { flex: 0 0 auto; background: var(--card-bg); border: 1px solid var(--border); color: var(--text-dim); font-size: 13px; font-weight: 700; padding: 6px 18px; border-radius: 99px; cursor: pointer; }
  .langbtn.active { background: var(--blue); color: #fff; border-color: var(--blue); }
  .langbtn.active[data-lang="jp"] { background: #8b5cf6; border-color: #8b5cf6; }
  main { padding: 14px 14px 0; max-width: 640px; margin: 0 auto; }
  .empty {
    text-align: center; padding: 70px 24px; color: var(--text-dim);
  }
  .empty .big { font-size: 44px; margin-bottom: 14px; }
  .empty p { font-size: 15px; line-height: 1.7; }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 14px;
    overflow: hidden;
  }
  .card-top { display: flex; gap: 14px; padding: 14px; }
  .card-img {
    flex: 0 0 108px; width: 108px;
    border-radius: 8px; overflow: hidden;
    background: var(--card-bg-2);
    display: flex; align-items: flex-start;
    cursor: zoom-in;
  }
  .card-img img { width: 100%; display: block; }
  .card-img .noimg {
    width: 100%; aspect-ratio: 63/88; display: flex;
    align-items: center; justify-content: center;
    color: #5c637a; font-size: 12px;
  }
  .card-info { flex: 1; min-width: 0; }
  .card-name { font-size: 18px; font-weight: 700; }
  .card-meta { font-size: 13px; color: var(--text-dim); margin-top: 3px; }
  .card-meta b { color: var(--text); font-weight: 600; }
  .badges { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 9px; }
  .badge {
    font-size: 11.5px; font-weight: 700; letter-spacing: .3px;
    padding: 4px 9px; border-radius: 6px;
  }
  .badge.need-1ed { background: rgba(245,197,66,.15); color: var(--gold); border: 1px solid rgba(245,197,66,.4); }
  .badge.need-unl { background: rgba(78,140,255,.15); color: var(--blue); border: 1px solid rgba(78,140,255,.4); }
  .badge.no1ed { background: rgba(154,161,178,.12); color: var(--text-dim); border: 1px solid var(--border); }
  .badge.qty { background: rgba(69,192,127,.15); color: var(--green); border: 1px solid rgba(69,192,127,.4); }
    . badge.cat { background: rgba(245,197,66,.15); color: var(--gold); border:1px solid rgba(245,197,66,.45); }
  .jpprice{font-size:12.5px;color:var(--green);margin-top:6px;font-weight:600;}
  .badge.jp { background: rgba(139,92,246,.18); color:#c9a6ff; border:1px solid rgba(139,92,246,.5); }
  .badge.en { background: rgba(45,212,191,.16); color:#5eead4; border:1px solid rgba(45,212,191,.5); }
  .badge.holo {
    background: linear-gradient(100deg, rgba(180,120,255,.25), rgba(78,140,255,.25), rgba(69,192,200,.25));
    color: #c9a6ff; border: 1px solid rgba(180,120,255,.55);
  }
  .prices { padding: 0 14px 12px; }
  table.pricetable { width: 100%; border-collapse: collapse; }
  .pricetable th, .pricetable td {
    text-align: center; padding: 8px 4px; font-size: 14px;
    border-top: 1px solid var(--border);
  }
  .pricetable th { color: var(--text-dim); font-size: 12px; font-weight: 600; }
  .pricetable td.rowlabel, .pricetable th.rowlabel { text-align: left; font-size: 12.5px; color: var(--text-dim); width: 68px; }
  .sgd { font-weight: 700; font-size: 15px; }
  .sgd.raw { color: var(--green); }
  .sgd.psa { color: var(--gold); }
  .usd { display: block; font-size: 11px; color: #5c637a; margin-top: 1px; }
  .na { color: #4a5065; }
  .price-date { font-size: 11px; color: #5c637a; text-align: right; padding: 0 14px 12px; }
  /* image lightbox */
  #lightbox {
    display: none; position: fixed; inset: 0; z-index: 99;
    background: rgba(0,0,0,.88);
    align-items: center; justify-content: center;
    cursor: zoom-out;
  }
  #lightbox img { max-width: 94vw; max-height: 90vh; border-radius: 10px; }
  footer {
    text-align: center; font-size: 12px; color: #4a5065;
    padding: 24px 0 10px;
  }
</style>
</head>
<body>

<header>
  <div class="title-row">
    <h1><span class="ball">●</span> FMC</h1>
    <span class="count-pill" id="countPill">0 张</span>
  </div>
  <div class="tabs">
    <div class="tab active" id="tabNeed">缺的卡</div>
    <div class="tab owned-tab" id="tabOwned">已有的卡</div>
  </div>
  <div class="searchbox">
    <span class="icon">🔍</span>
    <input id="search" type="search" placeholder="搜英文名，可加编号，如 slowbro 43" autocomplete="off" autocapitalize="off">
    <button class="clear" id="clearBtn">✕</button>
  </div>
  <div class="langrow">
    <button class="langbtn active" data-lang="all">全部</button>
    <button class="langbtn" data-lang="en">ENG</button>
    <button class="langbtn" data-lang="jp">JP</button>
  </div>
  <div class="chips" id="setChips"></div>
  <div class="hint" id="hint"></div>
</header>

<main id="results"></main>

<div id="lightbox"><img id="lightboxImg" alt=""></div>

<footer>价格来源 PriceCharting · 美元按拉取当日汇率换算新币<br>发截图给 Claude 即可添加新卡</footer>

function fmt(n) {
  if (n == null || isNaN(n)) return null;
  return n >= 100 ? Math.round(n).toLocaleString() : n.toFixed(2).replace(/\.00$/, '');
}
function priceCell(p, kind) {
  if (!p) return '<td><span class="na">—</span></td>';
  const sgd = kind === 'raw' ? p.rawSGD : p.psaSGD;
  const usd = kind === 'raw' ? p.rawUSD : p.psaUSD;
  if (sgd == null) return '<td><span class="na">—</span></td>';
  return `<td><span class="sgd ${kind === 'raw' ? 'raw' : 'psa'}">S$${fmt(sgd)}</span><span class="usd">US$${fmt(usd)}</span></td>`;
}
function badgeHtml(c) {
  const b = [];
  if (c.jp) {
    if (c.own && c.own.n) b.push(`<span class="badge qty">普通 ×${c.own.n}</span>`);
    if (c.own && c.own.h) b.push(`<span class="badge holo">闪 ×${c.own.h}</span>`);
    if (!c.own || (!c.own.n && !c.own.h)) b.push('<span class="badge no1ed">未持有</span>');
    if (c.vintage) b.push(`<span class="badge no1ed">老卡${c.rar ? ' · ' + c.rar : ''}</span>`);
    return b.join('');
  }
  if (c.catalog) b.push('<span class="badge cat">补充·待核</span>');
  if (c.missing) {
    if (c.promo) b.push('<span class="badge need-unl">缺</span>');
    else {
      if (c.missing === '1ED' || c.missing === 'BOTH') b.push('<span class="badge need-1ed">缺 1ED</span>');
      if (c.missing === 'UNL' || c.missing === 'BOTH') b.push('<span class="badge need-unl">缺 Unlimited</span>');
    }
  }
  if (c.qty1ed) b.push(`<span class="badge qty">已有 1ED ×${c.qty1ed}</span>`);
  if (c.qtyUnl) b.push(`<span class="badge qty">已有 UNL ×${c.qtyUnl}</span>`);
  if (c.qty) b.push(`<span class="badge qty">已有 ×${c.qty}</span>`);
  if (c.holo) b.push('<span class="badge holo">✦ Reverse Holo</span>');
  if (c.promo) b.push('<span class="badge no1ed">Promo</span>');
  else if (c.no1ed) b.push('<span class="badge no1ed">无 1ED 版</span>');
  return b.join('');
}

}

    ? `<img src="${c.img}" alt="${c.name}" loading="lazy" onclick="showLightbox(this.src)" onerror="this.outerHTML='<div class=noimg>图片加载失败</div>'">`

  q = q.trim().toLowerCase();
  if (!q) return { name: '', number: null };
  const m = q.match(/^(.*?)[\s#]*(\d+)$/);
  if (m && m[1].trim()) return { name: m[1].trim(), number: parseInt(m[2], 10) };
  if (/^\d+$/.test(q)) return { name: '', number: parseInt(q, 10) };
  return { name: q, number: null };
}

function render() {
  const { name, number } = parseQuery(searchEl.value);
  clearBtn.style.display = searchEl.value ? 'flex' : 'none';

  let list = CARDS.filter(c => {
    if (!inTab(c)) return false;
    if (!inLang(c)) return false;
    if (activeSet && c.set !== activeSet) return false;
    if (name && !c.name.toLowerCase().includes(name)) return false;
    if (number != null) {
      if (c.jp) { if (!String(c.number).includes(String(number))) return false; }
      else if (c.number !== number) return false;
    }
    return true;
  });
  list.sort((a, b) => a.set.localeCompare(b.set) || ((parseInt(a.number) || 0) - (parseInt(b.number) || 0)));

  const tabTotal = CARDS.filter(c => inTab(c) && inLang(c)).length;
  $('#countPill').textContent = `${tabTotal} 张`;
  $('#hint').textContent = (searchEl.value || activeSet)
    ? `匹配到 ${list.length} 张` : '';

  if (tabTotal === 0) {
    resultsEl.innerHTML = `<div class="empty">
      <div class="big">📸</div>
      <p>${activeTab === 'owned' ? '还没有录入已有的卡。' : '还没有录入缺的卡。'}<br>把卡片截图发给 Claude，<br>就会自动识别并加进来。</p>
    </div>`;
    return;
  }
  if (list.length === 0) {
    resultsEl.innerHTML = `<div class="empty"><div class="big">🤔</div><p>没有找到匹配的卡片</p></div>`;
    return;
  }
  resultsEl.innerHTML = list.map(cardHtml).join('');
}

function renderChips() {
  const sets = [...new Set(CARDS.filter(c => inTab(c) && inLang(c)).map(c => c.set))].sort();
  if (activeSet && !sets.includes(activeSet)) activeSet = null;
  if (sets.length === 0) { chipsEl.innerHTML = ''; return; }
  chipsEl.innerHTML = `<div class="chip ${!activeSet ? 'active' : ''}" data-set="">全部</div>` +
    sets.map(s => `<div class="chip ${activeSet === s ? 'active' : ''}" data-set="${s}">${s}</div>`).join('');
}

chipsEl.addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  activeSet = chip.dataset.set || null;
  renderChips(); render();
});
searchEl.addEventListener('input', render);
$('#tabNeed').addEventListener('click', () => {
  activeTab = 'need';
  $('#tabNeed').classList.add('active'); $('#tabOwned').classList.remove('active');
  renderChips(); render();
});
$('#tabOwned').addEventListener('click', () => {
  activeTab = 'owned';
  $('#tabOwned').classList.add('active'); $('#tabNeed').classList.remove('active');
  renderChips(); render();
});
document.querySelectorAll('.langbtn').forEach(btn => btn.addEventListener('click', () => {
  activeLang = btn.dataset.lang;
  document.querySelectorAll('.langbtn').forEach(b => b.classList.toggle('active', b === btn));
  renderChips(); render();
}));
clearBtn.addEventListener('click', () => { searchEl.value = ''; render(); searchEl.focus(); });

function showLightbox(src) {
  $('#lightboxImg').src = src;
  $('#lightbox').style.display = 'flex';
}
$('#lightbox').addEventListener('click', () => $('#lightbox').style.display = 'none');

renderChips(); render();
</script>
</body>
</html>
