<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FMC · Pokémon Card Checklist</title>
<style>
  :root {
    --bg: #f4f6f9;
    --card-bg: #ffffff;
    --card-bg-2: #eef1f6;
    --text: #1a1d24;
    --text-dim: #6b7280;
    --accent: #ff5350;
    --gold: #b8860b;
    --blue: #2f6fe0;
    --green: #159a55;
    --border: #e2e6ec;
    --shadow: 0 1px 3px rgba(20,25,40,.08), 0 6px 18px rgba(20,25,40,.06);
    --radius: 14px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans SC", sans-serif;
    min-height: 100vh;
    padding-bottom: 60px;
  }
  header {
    position: sticky; top: 0; z-index: 10;
    background: rgba(255,255,255,.9);
    backdrop-filter: blur(10px);
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
  }
  .headwrap { max-width: 1500px; margin: 0 auto; }
  .title-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 10px; }
  .tabs {
    display: flex; gap: 6px; margin-bottom: 10px;
    background: var(--card-bg-2); border: 1px solid var(--border);
    border-radius: 99px; padding: 4px;
  }
  .tab {
    flex: 1; text-align: center; font-size: 14px; font-weight: 600;
    color: var(--text-dim); padding: 8px 0; border-radius: 99px;
    cursor: pointer; transition: all .15s; user-select: none;
  }
  .tab.active { background: var(--accent); color: #fff; }
  .tab.active.owned-tab { background: var(--green); }
  .tab.active.jp-tab { background: #8b5cf6; color:#fff; }
  h1 { font-size: 19px; font-weight: 700; letter-spacing: .3px; }
  h1 .ball { color: var(--accent); }
  .count-pill {
    font-size: 12px; color: var(--text-dim);
    background: var(--card-bg-2); border: 1px solid var(--border);
    padding: 2px 10px; border-radius: 99px;
  }
  .searchbox { position: relative; }
  .searchbox input {
    width: 100%;
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 17px;
    padding: 13px 42px 13px 42px;
    outline: none;
    transition: border-color .15s;
  }
  .searchbox input:focus { border-color: var(--blue); }
  .searchbox input::placeholder { color: #9aa1b2; }
  .searchbox .icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: #9aa1b2; font-size: 16px; pointer-events: none;
  }
  .searchbox .clear {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    width: 30px; height: 30px; border-radius: 50%;
    border: none; background: var(--card-bg-2); color: var(--text-dim);
    font-size: 15px; display: none; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .hint { font-size: 12px; color: #9aa1b2; margin-top: 7px; }
  .chips {
    display: flex; gap: 8px; overflow-x: auto; margin-top: 10px;
    scrollbar-width: none; -webkit-overflow-scrolling: touch;
  }
  .chips::-webkit-scrollbar { display: none; }
  .chip {
    flex: 0 0 auto;
    background: var(--card-bg); border: 1px solid var(--border);
    color: var(--text-dim); font-size: 13px;
    padding: 7px 14px; border-radius: 99px; cursor: pointer;
    transition: all .15s; user-select: none;
  }
  .chip.active { background: var(--blue); border-color: var(--blue); color: #fff; font-weight: 600; }
  .langrow { display: flex; gap: 8px; margin-top: 10px; }
  .langbtn { flex: 0 0 auto; background: var(--card-bg); border: 1px solid var(--border); color: var(--text-dim); font-size: 13px; font-weight: 700; padding: 6px 18px; border-radius: 99px; cursor: pointer; }
  .langbtn.active { background: var(--blue); color: #fff; border-color: var(--blue); }
  .langbtn.active[data-lang="jp"] { background: #8b5cf6; border-color: #8b5cf6; }
  main { padding: 16px 14px 0; max-width: 1500px; margin: 0 auto; }
  .empty { text-align: center; padding: 70px 24px; color: var(--text-dim); }
  .empty .big { font-size: 44px; margin-bottom: 14px; }
  .empty p { font-size: 15px; line-height: 1.7; }

  /* ===== grid of card tiles ===== */
  .grid {
    display: grid;
    gap: 12px;
    grid-template-columns: repeat(2, 1fr);
  }
  @media (min-width: 560px)  { .grid { grid-template-columns: repeat(3, 1fr); } }
  @media (min-width: 760px)  { .grid { grid-template-columns: repeat(4, 1fr); } }
  @media (min-width: 980px)  { .grid { grid-template-columns: repeat(5, 1fr); } }
  @media (min-width: 1220px) { .grid { grid-template-columns: repeat(6, 1fr); } }
  @media (min-width: 1440px) { .grid { grid-template-columns: repeat(7, 1fr); } }

  .tile {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: transform .12s, box-shadow .12s;
    display: flex; flex-direction: column;
  }
  .tile:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
  .tile-imgwrap {
    position: relative;
    width: 100%; aspect-ratio: 63/88;
    background: var(--card-bg-2);
    display: flex; align-items: center; justify-content: center;
  }
  .tile-imgwrap img { width: 100%; height: 100%; object-fit: contain; display: block; }
  .tile-imgwrap .noimg { color: #9aa1b2; font-size: 11px; text-align: center; padding: 8px; line-height: 1.5; }
  .tile-corner {
    position: absolute; top: 6px; left: 6px;
    font-size: 10px; font-weight: 700; letter-spacing: .3px;
    padding: 2px 6px; border-radius: 5px; color: #fff;
  }
  .tile-corner.en { background: rgba(21,154,85,.92); }
  .tile-corner.jp { background: rgba(139,92,246,.92); }
  .tile-holo {
    position: absolute; top: 6px; right: 6px;
    font-size: 10px; font-weight: 700;
    padding: 2px 6px; border-radius: 5px; color: #fff;
    background: linear-gradient(100deg, #b478ff, #4e8cff, #45c0c8);
  }
  .tile-flags { position: absolute; bottom: 6px; left: 6px; right: 6px; display: flex; flex-wrap: wrap; gap: 4px; }
  .miniflag { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 5px; }
  .miniflag.need-1ed { background: var(--gold); color: #fff; }
  .miniflag.need-unl { background: var(--blue); color: #fff; }
  .miniflag.qty { background: var(--green); color: #fff; }
  .tile-info { padding: 7px 8px 9px; }
  .tile-name { font-size: 12.5px; font-weight: 700; line-height: 1.25; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tile-meta { font-size: 11px; color: var(--text-dim); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ===== detail card (reused in modal) ===== */
  .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .card-top { display: flex; gap: 14px; padding: 14px; }
  .card-img { flex: 0 0 128px; width: 128px; border-radius: 8px; overflow: hidden; background: var(--card-bg-2); display: flex; align-items: flex-start; cursor: zoom-in; }
  .card-img img { width: 100%; display: block; }
  .card-img .noimg { width: 100%; aspect-ratio: 63/88; display: flex; align-items: center; justify-content: center; color: #9aa1b2; font-size: 12px; }
  .card-info { flex: 1; min-width: 0; }
  .card-name { font-size: 18px; font-weight: 700; }
  .card-meta { font-size: 13px; color: var(--text-dim); margin-top: 3px; }
  .card-meta b { color: var(--text); font-weight: 600; }
  .badges { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 9px; }
  .badge { font-size: 11.5px; font-weight: 700; letter-spacing: .3px; padding: 4px 9px; border-radius: 6px; }
  .badge.need-1ed { background: rgba(184,134,11,.14); color: var(--gold); border: 1px solid rgba(184,134,11,.4); }
  .badge.need-unl { background: rgba(47,111,224,.12); color: var(--blue); border: 1px solid rgba(47,111,224,.4); }
  .badge.no1ed { background: rgba(107,114,128,.1); color: var(--text-dim); border: 1px solid var(--border); }
  .badge.qty { background: rgba(21,154,85,.12); color: var(--green); border: 1px solid rgba(21,154,85,.4); }
  .badge.cat { background: rgba(184,134,11,.14); color: var(--gold); border:1px solid rgba(184,134,11,.45); }
  .jpprice{font-size:12.5px;color:var(--green);margin-top:6px;font-weight:600;}
  .badge.jp { background: rgba(139,92,246,.14); color:#7c3aed; border:1px solid rgba(139,92,246,.45); }
  .badge.en { background: rgba(21,154,85,.14); color:var(--green); border:1px solid rgba(21,154,85,.45); }
  .badge.holo { background: linear-gradient(100deg, rgba(180,120,255,.18), rgba(78,140,255,.18), rgba(69,192,200,.18)); color: #7c3aed; border: 1px solid rgba(180,120,255,.5); }
  .prices { padding: 0 14px 12px; }
  table.pricetable { width: 100%; border-collapse: collapse; }
  .pricetable th, .pricetable td { text-align: center; padding: 8px 4px; font-size: 14px; border-top: 1px solid var(--border); }
  .pricetable th { color: var(--text-dim); font-size: 12px; font-weight: 600; }
  .pricetable td.rowlabel, .pricetable th.rowlabel { text-align: left; font-size: 12.5px; color: var(--text-dim); width: 68px; }
  .sgd { font-weight: 700; font-size: 15px; }
  .sgd.raw { color: var(--green); }
  .sgd.psa { color: var(--gold); }
  .usd { display: block; font-size: 11px; color: #9aa1b2; margin-top: 1px; }
  .na { color: #b6bcc9; }
  .price-date { font-size: 11px; color: #9aa1b2; text-align: right; padding: 0 14px 12px; }

  /* ===== detail modal ===== */
  #detail {
    display: none; position: fixed; inset: 0; z-index: 90;
    background: rgba(20,25,40,.55);
    align-items: center; justify-content: center;
    padding: 18px;
  }
  #detail .detail-inner {
    width: 100%; max-width: 460px; max-height: 92vh; overflow-y: auto;
    border-radius: var(--radius); box-shadow: var(--shadow);
    position: relative;
  }
  #detail .detail-close {
    position: absolute; top: 10px; right: 10px; z-index: 2;
    width: 32px; height: 32px; border-radius: 50%; border: none;
    background: rgba(0,0,0,.5); color: #fff; font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  /* image lightbox */
  #lightbox {
    display: none; position: fixed; inset: 0; z-index: 99;
    background: rgba(0,0,0,.9);
    align-items: center; justify-content: center;
    cursor: zoom-out;
  }
  #lightbox img { max-width: 94vw; max-height: 90vh; border-radius: 10px; }
  footer {
    text-align: center; font-size: 12px; color: #9aa1b2;
    padding: 24px 0 10px;
  }
</style>
</head>

<header>

    <h1><span class="ball">●</span> FMC</h1>

  </div>

    <button class="clear" id="clearBtn">✕</button>
  </div>
  <div class="langrow">
    <button class="langbtn active" data-lang="all">全部</button>
    <button class="langbtn" data-lang="en">ENG</button>
    <button class="langbtn" data-lang="jp">JP</button>
  </div>
  <div class="hint" id="hint"></div>
  </div>
</header>

<main id="results"></main>

<div id="detail"><div class="detail-inner"></div></div>

<div id="lightbox"><img id="lightboxImg" alt=""></div>

<footer>价格来源 PriceCharting · 美元按拉取当日汇率换算新币<br>发截图给 Claude 即可添加新卡</footer>

function parseQuery(q) {
  q = q.trim().toLowerCase();
  if (!q) return { name: '', number: null };
  const m = q.match(/^(.*?)[\s#]*(\d+)$/);
  if (m && m[1].trim()) return { name: m[1].trim(), number: parseInt(m[2], 10) };
  if (/^\d+$/.test(q)) return { name: '', number: parseInt(q, 10) };
  return { name: q, number: null };
}

function render() {
  const { name, number } = parseQuery(searchEl.value);
  clearBtn.style.display = searchEl.value ? 'flex' : 'none';

  let list = CARDS.filter(c => {
    if (!inTab(c)) return false;
    if (!inLang(c)) return false;
    if (activeSet && c.set !== activeSet) return false;
    if (name && !c.name.toLowerCase().includes(name)) return false;
    if (number != null) {
      if (c.jp) { if (!String(c.number).includes(String(number))) return false; }
      else if (c.number !== number) return false;
    }
    return true;
  });
  list.sort((a, b) => a.set.localeCompare(b.set) || ((parseInt(a.number) || 0) - (parseInt(b.number) || 0)));

  const tabTotal = CARDS.filter(c => inTab(c) && inLang(c)).length;
  $('#countPill').textContent = `${tabTotal} 张`;
  $('#hint').textContent = (searchEl.value || activeSet)
    ? `匹配到 ${list.length} 张` : '';

  if (tabTotal === 0) {
    resultsEl.innerHTML = `<div class="empty">
      <div class="big">📸</div>
      <p>${activeTab === 'owned' ? '还没有录入已有的卡。' : '还没有录入缺的卡。'}<br>把卡片截图发给 Claude，<br>就会自动识别并加进来。</p>
    </div>`;
    return;
  }
  if (list.length === 0) {
    resultsEl.innerHTML = `<div class="empty"><div class="big">🤔</div><p>没有找到匹配的卡片</p></div>`;
    return;
  }
  currentList = list;
  resultsEl.innerHTML = '<div class="grid">' + list.map((c, i) => tileHtml(c, i)).join('') + '</div>';
}


searchEl.addEventListener('input', render);
document.querySelectorAll('.langbtn').forEach(btn => btn.addEventListener('click', () => {
  activeLang = btn.dataset.lang;
  document.querySelectorAll('.langbtn').forEach(b => b.classList.toggle('active', b === btn));
  render();
}));
clearBtn.addEventListener('click', () => { searchEl.value = ''; render(); searchEl.focus(); });

function openDetail(idx) {
  const c = currentList[idx];
  if (!c) return;
  $('#detail .detail-inner').innerHTML =
    '<button class="detail-close" onclick="closeDetail()">✕</button>' + cardHtml(c);
  $('#detail').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}
function closeDetail() {
  $('#detail').style.display = 'none';
  document.body.style.overflow = '';
}
$('#detail').addEventListener('click', e => { if (e.target.id === 'detail') closeDetail(); });
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeDetail(); $('#lightbox').style.display = 'none'; }
});

function showLightbox(src) {
  $('#lightboxImg').src = src;
  $('#lightbox').style.display = 'flex';
}
$('#lightbox').addEventListener('click', () => $('#lightbox').style.display = 'none');

render();
