<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Pokémon Find My Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#f4efe4">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Find My Card">
<link rel="apple-touch-icon" href="icons/pokeball-v2.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/pokeball-v2.png">
<style>
  :root {
    --bg: #f5f6f7;
    --card-bg: #ffffff;
    --card-bg-2: #edeff1;
    --text: #1e2227;
    --text-dim: #888f97;
    --accent: #5d6b78;
    --gold: #c49a3f;
    --blue: #5f8fa8;
    --green: #6ba05c;
    --border: #e4e7ea;
    --shadow: 0 1px 2px rgba(20,28,40,.04), 0 6px 20px rgba(20,28,40,.05);
    --radius: 15px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans SC", sans-serif;
    min-height: 100vh;
    padding-bottom: 60px;
  }
  header {
    position: sticky; top: 0; z-index: 10;
    background: rgba(255,255,255,.9);
    backdrop-filter: blur(10px);
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
  }
  .headwrap { max-width: 1500px; margin: 0 auto; }
  .title-row { display: flex; flex-direction: column; align-items: center; gap: 7px; margin-bottom: 14px; }
  .tabs {
    display: flex; gap: 6px; margin-bottom: 10px;
    background: var(--card-bg-2); border: 1px solid var(--border);
    border-radius: 99px; padding: 4px;
  }
  .tab {
    flex: 1; text-align: center; font-size: 14px; font-weight: 600;
    color: var(--text-dim); padding: 8px 0; border-radius: 99px;
    cursor: pointer; transition: all .15s; user-select: none;
  }
  .tab.active { background: var(--accent); color: #fff; }
  .tab.active.owned-tab { background: var(--green); }
  .tab.active.jp-tab { background: #8b5cf6; color:#fff; }
  h1.apptitle { font-family: 'Fredoka', 'PingFang SC', system-ui, sans-serif; font-size: clamp(26px, 5.5vw, 36px); font-weight: 600; letter-spacing: .8px; text-align: center; color: var(--text); }
  h1 .ball { color: var(--accent); }
  .count-pill {
    font-size: 12px; color: var(--text-dim);
    background: var(--card-bg-2); border: 1px solid var(--border);
    padding: 2px 10px; border-radius: 99px;
  }
  .searchbox { position: relative; }
  .searchbox input {
    width: 100%;
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 17px;
    padding: 13px 42px 13px 42px;
    outline: none;
    transition: border-color .15s;
  }
  .searchbox input:focus { border-color: var(--blue); }
  .searchbox input::placeholder { color: #9aa1b2; }
  .searchbox .icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: #9aa1b2; font-size: 16px; pointer-events: none;
  }
  .searchbox .clear {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    width: 30px; height: 30px; border-radius: 50%;
    border: none; background: var(--card-bg-2); color: var(--text-dim);
    font-size: 15px; display: none; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .hint { font-size: 12px; color: #9aa1b2; margin-top: 7px; }
  .chips {
    display: flex; gap: 8px; overflow-x: auto; margin-top: 10px;
    scrollbar-width: none; -webkit-overflow-scrolling: touch;
  }
  .chips::-webkit-scrollbar { display: none; }
  .chip {
    flex: 0 0 auto;
    background: var(--card-bg); border: 1px solid var(--border);
    color: var(--text-dim); font-size: 13px;
    padding: 7px 14px; border-radius: 99px; cursor: pointer;
    transition: all .15s; user-select: none;
  }
  .chip.active { background: var(--blue); border-color: var(--blue); color: #fff; font-weight: 600; }
  .langrow { display: flex; gap: 8px; margin-top: 10px; margin-bottom: 15px; }
  .langbtn { flex: 0 0 auto; background: var(--card-bg); border: 1px solid var(--border); color: var(--text-dim); font-size: 13px; font-weight: 700; padding: 6px 18px; border-radius: 99px; cursor: pointer; }
  .langbtn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .langbtn.active[data-lang="jp"] { background: #8b5cf6; border-color: #8b5cf6; }
  main { padding: 16px 14px 0; max-width: 1500px; margin: 0 auto; }
  .empty { text-align: center; padding: 70px 24px; color: var(--text-dim); }
  .empty .big { font-size: 44px; margin-bottom: 14px; }
  .empty p { font-size: 15px; line-height: 1.7; }

  /* ===== grid of card tiles ===== */
  .grid {
    display: grid;
    gap: 12px;
    grid-template-columns: repeat(2, 1fr);
  }
  @media (min-width: 560px)  { .grid { grid-template-columns: repeat(3, 1fr); } }
  @media (min-width: 760px)  { .grid { grid-template-columns: repeat(4, 1fr); } }
  @media (min-width: 980px)  { .grid { grid-template-columns: repeat(5, 1fr); } }
  @media (min-width: 1220px) { .grid { grid-template-columns: repeat(6, 1fr); } }
  @media (min-width: 1440px) { .grid { grid-template-columns: repeat(7, 1fr); } }

  .tile {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: transform .12s, box-shadow .12s;
    display: flex; flex-direction: column;
  }
  .tile:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
  .tile-imgwrap {
    position: relative;
    width: 100%; aspect-ratio: 63/88;
    background: var(--card-bg-2);
    display: flex; align-items: center; justify-content: center;
  }
  .tile-imgwrap img { width: 100%; height: 100%; object-fit: contain; display: block; }
  .tile-imgwrap .noimg { color: #9aa1b2; font-size: 11px; text-align: center; padding: 8px; line-height: 1.5; }
  .tile-corner {
    position: absolute; top: 6px; left: 6px;
    font-size: 10px; font-weight: 700; letter-spacing: .3px;
    padding: 2px 6px; border-radius: 5px; color: #fff;
  }
  .tile-corner.en { background: rgba(95,143,168,.96); }
  .tile-corner.jp { background: rgba(149,120,172,.96); }
  .tile-holo {
    position: absolute; top: 6px; right: 6px;
    font-size: 10px; font-weight: 700;
    padding: 2px 6px; border-radius: 5px; color: #fff;
    background: linear-gradient(100deg, #b478ff, #4e8cff, #45c0c8);
  }
  .tile-flags { position: absolute; bottom: 6px; left: 6px; right: 6px; display: flex; flex-wrap: wrap; gap: 4px; }
  .miniflag { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 5px; }
  .miniflag.need-1ed { background: var(--gold); color: #fff; }
  .miniflag.need-unl { background: var(--blue); color: #fff; }
  .miniflag.qty { background: var(--green); color: #fff; }
  .tile-info { padding: 7px 8px 9px; }
  .tile-name { font-size: 12.5px; font-weight: 700; line-height: 1.25; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tile-meta { font-size: 11px; color: var(--text-dim); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ===== detail card (reused in modal) ===== */
  .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .card-top { display: flex; gap: 14px; padding: 14px; }
  .card-img { flex: 0 0 128px; width: 128px; border-radius: 8px; overflow: hidden; background: var(--card-bg-2); display: flex; align-items: flex-start; cursor: zoom-in; }
  .card-img img { width: 100%; display: block; }
  .card-img .noimg { width: 100%; aspect-ratio: 63/88; display: flex; align-items: center; justify-content: center; color: #9aa1b2; font-size: 12px; }
  .card-info { flex: 1; min-width: 0; }
  .card-name { font-size: 18px; font-weight: 700; }
  .card-meta { font-size: 13px; color: var(--text-dim); margin-top: 3px; }
  .card-meta b { color: var(--text); font-weight: 600; }
  .badges { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 9px; }
  .badge { font-size: 11.5px; font-weight: 700; letter-spacing: .3px; padding: 4px 9px; border-radius: 6px; }
  .badge.need-1ed { background: rgba(184,134,11,.14); color: var(--gold); border: 1px solid rgba(184,134,11,.4); }
  .badge.need-unl { background: rgba(47,111,224,.12); color: var(--blue); border: 1px solid rgba(47,111,224,.4); }
  .badge.no1ed { background: rgba(107,114,128,.1); color: var(--text-dim); border: 1px solid var(--border); }
  .badge.qty { background: rgba(21,154,85,.12); color: var(--green); border: 1px solid rgba(21,154,85,.4); }
  .badge.cat { background: rgba(184,134,11,.14); color: var(--gold); border:1px solid rgba(184,134,11,.45); }
  .jpprice{font-size:12.5px;color:var(--green);margin-top:6px;font-weight:600;}
  .badge.jp { background: rgba(149,120,172,.2); color:#5a4570; border:1px solid rgba(149,120,172,.55); }
  .badge.en { background: rgba(95,143,168,.18); color:#3d6478; border:1px solid rgba(95,143,168,.55); }
  .badge.holo { background: linear-gradient(100deg, rgba(180,120,255,.18), rgba(78,140,255,.18), rgba(69,192,200,.18)); color: #7c3aed; border: 1px solid rgba(180,120,255,.5); }
  .badge.have { background: #6ba05c; color: #fff; border: none; font-weight: 700; }
  .badge.miss { background: #d07f70; color: #fff; border: none; font-weight: 700; }
  .badge.miss-ed { background: #d0a145; color: #fff; border: none; font-weight: 700; }
  .miniflag.have { background: #6ba05c; color: #fff; }
  .miniflag.miss { background: #d07f70; color: #fff; }
  .miniflag.miss-ed { background: #d0a145; color: #fff; }
  .miniflag.holo { background: linear-gradient(100deg, #b09bd6, #8fb0d6, #a2cbc8); color: #fff; }
  .pc-link { display: block; text-align: center; margin-top: 12px; padding: 10px; border-radius: 10px; background: #5f8fa8; color: #fff; font-weight: 700; font-size: 13.5px; text-decoration: none; }
  .pc-link:active { opacity: .82; }
  .offline-btn { display:inline-block; margin:0 auto 8px; padding:8px 18px; border:1px solid var(--border); border-radius:99px; background:var(--card-bg); color:var(--text-dim); font-size:12.5px; font-weight:700; cursor:pointer; }
  .offline-btn:disabled { opacity:.55; }
  .offline-prog { font-size:12px; color:var(--text-dim); margin-bottom:6px; }
  .moderow { display: flex; gap: 8px; justify-content: center; margin-bottom: 10px; margin-top: 2px; }
  .searchbox { position: sticky; top: 0; z-index: 12; background: var(--bg); padding-top: 8px; padding-bottom: 8px; transition: transform .26s ease; }
  body.search-hidden .searchbox { transform: translateY(-135%); }
  .modebtn { flex: 0 0 auto; background: var(--card-bg); border: 1px solid var(--border); color: var(--text-dim); font-size: 13px; font-weight: 700; padding: 6px 18px; border-radius: 99px; cursor: pointer; }
  .modebtn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .dex-sec { margin: 0 0 24px; }
  .dex-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 6px; padding: 0 2px; }
  .dex-fam { font-family: 'Fredoka', system-ui, sans-serif; font-size: 19px; font-weight: 600; color: var(--text); }
  .dex-prog-txt { font-size: 12.5px; color: var(--text-dim); font-weight: 700; }
  .dex-bar { height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; margin-bottom: 12px; }
  .dex-bar-fill { height: 100%; background: var(--green); border-radius: 99px; transition: width .3s; }
  .dex-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(104px, 1fr)); gap: 10px; max-height: 430px; overflow-y: auto; padding: 2px 8px 4px 2px; scrollbar-width: thin; scrollbar-color: rgba(120,110,95,.22) transparent; -webkit-overflow-scrolling: touch; }
  .dex-row::-webkit-scrollbar { width: 6px; }
  .dex-row::-webkit-scrollbar-track { background: transparent; }
  .dex-row::-webkit-scrollbar-thumb { background: rgba(120,110,95,.18); border-radius: 99px; }
  .dex-row::-webkit-scrollbar-thumb:hover { background: rgba(120,110,95,.34); }
  .dex-card { cursor: pointer; }
  .dex-imgwrap { position: relative; width: 100%; aspect-ratio: 63/88; border-radius: 9px; overflow: hidden; background: var(--card-bg-2); border: 1px solid var(--border); }
  .dex-imgwrap img { width: 100%; height: 100%; object-fit: contain; display: block; }
  .dex-imgwrap .noimg { color: var(--text-dim); font-size: 10px; text-align: center; padding: 6px; line-height: 1.4; display: flex; align-items: center; justify-content: center; height: 100%; }
  .dex-card.missing .dex-imgwrap img { filter: grayscale(1) opacity(.45); }
  .dex-miss { position: absolute; left: 6px; bottom: 6px; background: #d07f70; color: #fff; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 5px; }
  .dex-name { font-size: 12px; font-weight: 700; color: var(--text); margin-top: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dex-meta { font-size: 10.5px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .prices { padding: 0 14px 12px; }
  table.pricetable { width: 100%; border-collapse: collapse; }
  .pricetable th, .pricetable td { text-align: center; padding: 8px 4px; font-size: 14px; border-top: 1px solid var(--border); }
  .pricetable th { color: var(--text-dim); font-size: 12px; font-weight: 600; }
  .pricetable td.rowlabel, .pricetable th.rowlabel { text-align: left; font-size: 12.5px; color: var(--text-dim); width: 68px; }
  .sgd { font-weight: 700; font-size: 15px; }
  .sgd.raw { color: var(--green); }
  .sgd.psa { color: var(--gold); }
  .usd { display: block; font-size: 11px; color: #9aa1b2; margin-top: 1px; }
  .na { color: #b6bcc9; }
  .price-date { font-size: 11px; color: #9aa1b2; text-align: right; padding: 0 14px 12px; }

  /* ===== detail modal ===== */
  #detail {
    display: none; position: fixed; inset: 0; z-index: 90;
    background: rgba(20,25,40,.55);
    align-items: center; justify-content: center;
    padding: 18px;
  }
  #detail .detail-inner {
    width: 100%; max-width: 460px; max-height: 92vh; overflow-y: auto;
    border-radius: var(--radius); box-shadow: var(--shadow);
    position: relative;
  }
  #detail .detail-close {
    position: absolute; top: 10px; right: 10px; z-index: 2;
    width: 32px; height: 32px; border-radius: 50%; border: none;
    background: rgba(0,0,0,.5); color: #fff; font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  #detail .detail-copy { position: absolute; top: 10px; right: 50px; z-index: 2; width: 32px; height: 32px; border-radius: 50%; border: none; background: rgba(0,0,0,.38); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  #detail .detail-copy.copied { background: #6ba05c; transform: scale(1.12); }
  #detail .detail-copy.copied::after { content: "已复制 ✓"; position: absolute; top: 40px; right: -4px; background: #6ba05c; color: #fff; font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 7px; white-space: nowrap; box-shadow: 0 2px 6px rgba(60,80,50,.25); }
  #detail .detail-inner.wide { max-width: 640px; }
  /* ===== dex art-group detail ===== */
  .gdetail { background: var(--bg); border-radius: var(--radius); padding: 22px 16px 26px; }
  .gdetail-head { text-align: center; padding: 0 34px; }
  .gdetail-title { font-size: 21px; font-weight: 800; color: var(--text); letter-spacing: .2px; }
  .gdetail-sub { display: inline-block; font-size: 12px; color: var(--text-dim); margin-top: 7px; padding: 4px 12px; background: var(--card-bg-2); border-radius: 99px; }
  .gdetail-sub b { color: var(--accent); }
  .gdetail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(116px, 1fr)); gap: 13px; margin-top: 20px; }
  .gcard { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 8px 8px 10px; text-align: center; box-shadow: 0 1px 2px rgba(30,40,60,.04); }
  .gcard.gmiss { opacity: .58; }
  .gimg-wrap { position: relative; aspect-ratio: 63 / 88; border-radius: 8px; overflow: hidden; background: var(--card-bg-2); }
  .gimg-wrap img { width: 100%; height: 100%; object-fit: contain; cursor: zoom-in; }
  .gnoimg { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #9aa1b2; }
  .glang { position: absolute; top: 5px; left: 5px; font-size: 9.5px; font-weight: 800; color: #fff; padding: 1.5px 6px; border-radius: 6px; letter-spacing: .3px; box-shadow: 0 1px 2px rgba(0,0,0,.18); }
  .glang.en { background: rgba(95,143,168,.96); }
  .glang.jp { background: rgba(149,120,172,.96); }
  .gfin { position: absolute; top: 5px; right: 5px; font-size: 9.5px; font-weight: 800; padding: 1.5px 6px; border-radius: 6px; box-shadow: 0 1px 2px rgba(0,0,0,.18); }
  .gfin.h { background: linear-gradient(135deg,#f6d878,#e0a83c); color: #5a3d00; }
  .gfin.c { background: rgba(255,255,255,.92); color: #7a828a; border: 1px solid #e0e3e6; box-shadow: 0 1px 2px rgba(0,0,0,.08); }
  .gimgalt { position: absolute; bottom: 5px; left: 5px; font-size: 9px; font-weight: 700; color: #fff; background: rgba(196,118,44,.92); padding: 1.5px 6px; border-radius: 6px; letter-spacing: .3px; box-shadow: 0 1px 2px rgba(0,0,0,.2); }
  .gset { font-size: 11.5px; font-weight: 700; color: var(--text); margin-top: 8px; line-height: 1.25; word-break: break-word; }
  .gnum { font-size: 10.5px; color: var(--text-dim); margin-top: 2px; }
  .gown { font-size: 10.5px; font-weight: 700; margin-top: 8px; padding: 3.5px 4px; border-radius: 7px; }
  .gown-y { color: #43723a; background: #e8f4e2; }
  .gown-n { color: #a4aab0; background: #f0f1f2; }
  .gactions { display: flex; gap: 5px; margin-top: 7px; }
  .gactions .gcopy, .gactions .gpc { flex: 1; min-width: 0; margin-top: 0; }
  .gcopy { border: none; cursor: pointer; text-align: center; padding: 5px 4px; border-radius: 7px; background: #edeff1; color: #667380; font-size: 10.5px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .gcopy.copied { background: #6ba05c; color: #fff; }
  .gcopy:active { opacity: .78; }
  .gpc { display: block; text-align: center; padding: 5px 4px; border-radius: 7px; background: #eef2f5; color: #5f8fa8; font-size: 10.5px; font-weight: 700; text-decoration: none; white-space: nowrap; }
  .gpc:active { opacity: .78; }
  /* image lightbox */
  #lightbox {
    display: none; position: fixed; inset: 0; z-index: 99;
    background: rgba(0,0,0,.9);
    align-items: center; justify-content: center;
    cursor: zoom-out;
  }
  #lightbox img { max-width: 94vw; max-height: 90vh; border-radius: 10px; }
  footer {
    text-align: center; font-size: 12px; color: #9aa1b2;
    padding: 24px 0 10px;
  }
</style>
</head>
<body>

<header>
  <div class="headwrap">
  <div class="title-row">
    <h1 class="apptitle"><span class="ball">●</span> Pokémon Find My Card</h1>
    <span class="count-pill" id="countPill">0 张</span>
  </div>
  <div class="searchbox">
    <span class="icon">🔍</span>
    <input id="search" type="search" placeholder="搜英文名，可加编号，如 slowbro 43" autocomplete="off" autocapitalize="off">
    <button class="clear" id="clearBtn">✕</button>
  </div>
  <div class="langrow">
    <button class="langbtn active" data-lang="all">全部</button>
    <button class="langbtn" data-lang="en">ENG</button>
    <button class="langbtn" data-lang="jp">JP</button>
  </div>
  <div class="moderow">
    <button class="modebtn active" data-mode="dex">📖 图鉴</button>
    <button class="modebtn" data-mode="grid">📚 库</button>
  </div>
  <div class="hint" id="hint"></div>
  </div>
</header>

<main id="results"></main>

<div id="detail"><div class="detail-inner"></div></div>

<div id="lightbox"><img id="lightboxImg" alt=""></div>

<footer><button id="offlineBtn" class="offline-btn">📥 离线缓存全部卡图（约150MB）</button><div id="offlineProg" class="offline-prog"></div>价格来源 PriceCharting · 美元按拉取当日汇率换算新币<br>发截图给 Claude 即可添加新卡</footer>

<script>
/* ============================================================
   卡片数据 —— 由 Claude 维护。字段说明：
   name    英文名 (搜索用, 小写匹配)
   number  系列内编号 (如 43/62 记 43)
   total   系列总数 (62)
   set     系列名 (如 "Fossil")
   missing "1ED" | "UNL" | "BOTH" | null  缺哪个版本 (null/缺省 = 不缺)

  if (c.no1ed || c.promo) { const q = c.qty || 0; return { total: q, label: q ? '持有 ×' + q : '未持有' }; }
  const a = c.qty1ed || 0, b = c.qtyUnl || 0, t = a + b;
  const p = []; if (a) p.push('1ED×' + a); if (b) p.push('无印×' + b);
  return { total: t, label: t ? p.join(' · ') : '未持有' };
}
function groupDetailHtml(rep, members) {
  const list = members.slice().sort((x, y) =>
    (x.jp ? 1 : 0) - (y.jp ? 1 : 0) || String(x.set).localeCompare(String(y.set)) || (parseInt(x.number) || 0) - (parseInt(y.number) || 0));
  const ownedCount = list.filter(isOwned).length;
  const holoKeys = new Set(list.filter(c => c.holo).map(c => String(c.set) + '|' + String(c.number)));
  const cells = list.map(c => {
    const oi = ownInfo(c);
    const owned = oi.total > 0;
    const img = c.img
      ? `<img src="${c.img}" alt="${c.name}" loading="lazy" onclick="showLightbox(this.src)" onerror="this.parentNode.innerHTML='<div class=gnoimg>图待补</div>'">`
      : `<div class="gnoimg">图待补</div>`;
    let fin = '';
    if (c.holo) fin = '<span class="gfin h">✦ 闪</span>';
    else if (holoKeys.has(String(c.set) + '|' + String(c.number))) fin = '<span class="gfin c">普通</span>';
    const copyStr = (c.name + ' #' + (c.numDisplay || c.number) + (c.total ? '/' + c.total : '') + ' · ' + c.set + ' · ' + (c.jp ? 'JP' : 'ENG') + (c.holo ? ' · holo' : '')).replace(/&/g, '&amp;').replace(/"/g, '&quot;');
    return `<div class="gcard ${owned ? '' : 'gmiss'}">
      <div class="gimg-wrap">${img}<span class="glang ${c.jp ? 'jp' : 'en'}">${c.jp ? 'JP' : 'ENG'}</span>${fin}${c.imgAlt && c.img ? '<span class="gimgalt" title="暂用同款其他版本的图">代图</span>' : ''}</div>
      <div class="gset">${c.set}</div>
      <div class="gnum">#${c.numDisplay || c.number}${c.total ? '/' + c.total : ''}</div>
      <div class="gown ${owned ? 'gown-y' : 'gown-n'}">${oi.label}</div>
      <div class="gactions">
        <button class="gcopy" data-c="${copyStr}" onclick="copyGCard(this)" title="复制卡片定位信息">⧉ 复制</button>
        <a class="gpc" href="${pcUrl(c)}" target="_blank" rel="noopener noreferrer">实时价 ↗</a>
      </div>
    </div>`;
  }).join('');
  return `<div class="gdetail">
    <div class="gdetail-head">
      <div class="gdetail-title">${rep.name}</div>
      <div class="gdetail-sub">同一画作 · ${list.length} 个版本 · 持有 <b>${ownedCount}/${list.length}</b></div>
    </div>
    <div class="gdetail-grid">${cells}</div>
  </div>`;
}
function openDetail(idx) {
  const c = currentList[idx];
  if (!c) return;
  const inner = $('#detail .detail-inner');
  if (viewMode === 'dex') {
    const members = c.art ? CARDS.filter(x => x.art === c.art) : (currentGroups[idx] || [c]);
    inner.classList.add('wide');
    inner.innerHTML = '<button class="detail-close" onclick="closeDetail()">✕</button>' + groupDetailHtml(c, members);
  } else {
    inner.classList.remove('wide');
    inner.innerHTML =
      '<button class="detail-close" onclick="closeDetail()">✕</button>' + '<button class="detail-copy" onclick="copyCard(' + idx + ')" title="复制卡片信息"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg></button>' + cardHtml(c);
  }
  $('#detail').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}
function closeDetail() {
  $('#detail').style.display = 'none';
  document.body.style.overflow = '';
}
$('#detail').addEventListener('click', e => { if (e.target.id === 'detail') closeDetail(); });
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeDetail(); $('#lightbox').style.display = 'none'; }
});

function showLightbox(src) {
  $('#lightboxImg').src = src;
  $('#lightbox').style.display = 'flex';
}
$('#lightbox').addEventListener('click', () => $('#lightbox').style.display = 'none');
document.body.classList.toggle('dex-mode', viewMode === 'dex');
let _lastY = 0;
window.addEventListener('scroll', () => {
  if (viewMode !== 'dex') { document.body.classList.remove('search-hidden'); return; }
  const y = window.scrollY;
  if (y > _lastY && y > 90) document.body.classList.add('search-hidden');
  else document.body.classList.remove('search-hidden');
  _lastY = y;
}, { passive: true });

render();

// ---- PWA: service worker + offline image precache ----
if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(function(){}); }
(function () {
  var btn = document.getElementById('offlineBtn'), prog = document.getElementById('offlineProg');
  if (!btn) return;
  var saved = localStorage.getItem('fmc-cached-count');
  if (saved) prog.textContent = '已离线缓存 ' + saved + ' 张卡图';
  btn.addEventListener('click', async function () {
    if (!('caches' in window)) { prog.textContent = '此浏览器不支持离线缓存'; return; }
    var urls = Array.from(new Set(CARDS.map(function (c) { return c.img; }).filter(Boolean)));
    btn.disabled = true;
    var cache = await caches.open('fmc-v1'), done = 0, ok = 0;
    for (var i = 0; i < urls.length; i++) {
      try { var m = await cache.match(urls[i]); if (!m) { await cache.add(urls[i]); } ok++; } catch (e) {}
      done++;
      if (done % 3 === 0 || done === urls.length) prog.textContent = '缓存中… ' + done + '/' + urls.length;
    }
    prog.textContent = '✓ 已离线缓存 ' + ok + '/' + urls.length + ' 张，可离线使用';
    localStorage.setItem('fmc-cached-count', ok);
    btn.disabled = false;
  });
})();
</script>
