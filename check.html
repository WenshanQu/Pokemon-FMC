  .fam .fc{font-size:12px;font-weight:600;color:#6b7280;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:14px;}
  .card{background:#fff;border:1px solid #e4e7ea;border-radius:10px;padding:8px;position:relative;}
  .num{position:absolute;top:7px;left:7px;min-width:26px;height:26px;padding:0 6px;border-radius:99px;background:#5d6b78;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;z-index:2;box-shadow:0 1px 3px rgba(0,0,0,.2);}
  .imgwrap{width:100%;aspect-ratio:63/88;background:#edeff1;border-radius:7px;overflow:hidden;display:flex;align-items:center;justify-content:center;}
  .imgwrap img{width:100%;height:100%;object-fit:contain;}
  .noimg{font-size:10px;color:#98a;text-align:center;padding:6px;}
  .meta{font-size:11px;margin:6px 2px 5px;line-height:1.35;}
  .meta b{font-size:12.5px;}
  .dim{color:#6b7280;}
  input{width:100%;padding:6px 8px;border:1px solid #cfd4d9;border-radius:6px;font-size:13px;}
  input.filled{border-color:#5d6b78;background:#eef1f3;}
  .card.merged{background:#eef6ec;border-color:#c2ddbd;opacity:.66;}
  .num.mnum{background:#6ba05c;}
  .artbadge{width:100%;padding:6px 8px;border-radius:6px;font-size:12px;font-weight:700;text-align:center;background:#6ba05c;color:#fff;}
  body.hide-merged .card.merged{display:none;}
  body.hide-merged section.allmerged{display:none;}

const FAM_ORDER=['Meowth','Psyduck','Slowpoke','Slowbro','Slowking','Quagsire','其他'];
function family(c){const n=c.name;if(/Quagsire/i.test(n))return'Quagsire';if(/Slowking/i.test(n))return'Slowking';if(/Slowbro/i.test(n))return'Slowbro';if(/Slowpoke/i.test(n))return'Slowpoke';if(/Psyduck/i.test(n))return'Psyduck';if(/Meowth/i.test(n))return'Meowth';return'其他';}
const root=document.getElementById('root');
document.getElementById('cnt').textContent=CARDS.length;
try{localStorage.removeItem('artcheck');}catch(e){}
const saved=JSON.parse(localStorage.getItem('artcheck2')||'{}');
const byFam={};
CARDS.forEach((c,i)=>{const f=family(c);(byFam[f]=byFam[f]||[]).push(i);});
FAM_ORDER.forEach(fam=>{
  const idxs=byFam[fam]; if(!idxs||!idxs.length)return;
  // collapse each art group to ONE representative (member with an image, else first); unmerged cards stay individual
  const unmerged=[], artMembers={};
  idxs.forEach(i=>{const c=CARDS[i]; if(c.art){(artMembers[c.art]=artMembers[c.art]||[]).push(i);} else unmerged.push(i);});
  const reps=Object.keys(artMembers).sort().map(a=>{
    const mem=artMembers[a]; let rep=mem[0];
    for(const i of mem){ if(CARDS[i].img){rep=i;break;} }
    return {i:rep, art:a, cnt:mem.length};
  });
  unmerged.sort((a,b)=>a-b);
  const distinct=unmerged.length+reps.length;
  const sec=document.createElement('section');
  if(unmerged.length===0) sec.className='allmerged';
  const h=document.createElement('h2'); h.className='fam';
  h.innerHTML=fam+' <span class="fc">'+distinct+' 画作 · '+(unmerged.length?('<b style="color:#c07a2b">'+unmerged.length+' 待处理</b>'):'<b style="color:#6ba05c">已全部归类</b>')+'</span>';
  const g=document.createElement('div'); g.className='grid';
  const mk=(i,art,cnt)=>{
    const c=CARDS[i], n=i+1;
    const img=c.img?('<img src="'+c.img+'" loading="lazy" onerror="this.parentNode.innerHTML=\'<div class=noimg>图待补</div>\'">'):'<div class="noimg">图待补</div>';
    const lang=c.jp?'JP':'EN'; const v=(saved[n]||'');
    const el=document.createElement('div'); el.className='card'+(art?' merged':'');
    const bottom=art
      ?('<div class="artbadge">组 '+art+(cnt>1?(' · '+cnt+'张'):'')+'</div>')
      :('<input data-i="'+n+'" placeholder="记号" value="'+v.replace(/"/g,'&quot;')+'">');
    el.innerHTML='<div class="num'+(art?' mnum':'')+'">'+n+'</div><div class="imgwrap">'+img+'</div>'
      +'<div class="meta"><b>'+c.name+'</b><br><span class="dim">'+c.set+' · #'+(c.numDisplay||c.number)+' · '+lang+'</span></div>'
      +bottom;
    g.appendChild(el);
  };
  unmerged.forEach(i=>mk(i,null,0));
  reps.forEach(r=>mk(r.i,r.art,r.cnt));
  sec.appendChild(h); sec.appendChild(g); root.appendChild(sec);
});
function refl(inp){inp.classList.toggle('filled',!!inp.value.trim());}
document.querySelectorAll('#root input').forEach(refl);
root.addEventListener('input',e=>{if(e.target.tagName!=='INPUT')return;saved[e.target.dataset.i]=e.target.value;localStorage.setItem('artcheck2',JSON.stringify(saved));refl(e.target);});
function exp(){
  const g={};
  document.querySelectorAll('#root input').forEach(inp=>{const t=inp.value.trim();if(t){(g[t]=g[t]||[]).push(inp.dataset.i);}});
  const lines=Object.keys(g).sort().map(k=>k+' => '+g[k].join(', '));
  const o=document.getElementById('out');o.style.display='block';
  o.textContent=lines.length?('按记号分组：\n'+lines.join('\n')):'(还没有任何标注)';
  o.scrollIntoView({behavior:'smooth'});
}
function tgl(){const on=document.body.classList.toggle('hide-merged');document.getElementById('tglbtn').textContent=on?'显示已合并':'隐藏已合并';}
function clr(){if(confirm('确定清空所有标注？')){localStorage.removeItem('artcheck');localStorage.removeItem('artcheck2');location.reload();}}
