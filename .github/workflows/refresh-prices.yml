name: Refresh prices

on:
  schedule:
    - cron: '17 3 * * 1'      # every Monday 03:17 UTC
  workflow_dispatch: {}         # allow manual "Run workflow" from the Actions tab

permissions:
  contents: write

concurrency:
  group: refresh-prices
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh prices (Limitless EN + snkrdunk JP)
        run: node scripts/refresh-prices.mjs

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain index.html)" ]; then
            git config user.name "price-refresh-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "Auto-refresh prices (Limitless + snkrdunk) [skip ci]"
            git push
            echo "Prices updated and pushed."
          else
            echo "No price changes."
          fi
